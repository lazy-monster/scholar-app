name: Release APK

# Tag a commit to cut a release. The tag prefix selects the app — both apps ship from this one repo
# (Option B), and the in-app updater tells them apart by the "<slug>-…apk" asset name:
#
#   v0.11.2  or  zh-v0.11.2   → Tianxian (:app-zh)  → tianxian-v0.11.2.apk
#   ja-v0.1.0                 → Tensen   (:app-ja)  → tensen-v0.1.0.apk
#
# The version *name* is taken from the tag and injected into the build, so a built APK can never
# disagree with its release tag again (the drift that made the updater nag forever). The version
# *code* is the CI run number (offset so it stays above historical hand-set codes), giving a
# monotonic, per-app-increasing value without anyone having to bump it by hand.
on:
  push:
    tags:
      - 'v*'
      - 'zh-v*'
      - 'ja-v*'
  workflow_dispatch:

permissions:
  contents: write        # needed to create the Release and upload the APK

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Derive the app, module, slug and version from the pushed tag.
      - name: Identify app from tag
        id: app
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag##*-}"      # strip any "zh-"/"ja-" prefix → "v0.11.2"
          version="${version#v}"    # drop the leading v          → "0.11.2"
          if [[ "$tag" == ja-* ]]; then
            echo "module=:app-ja" >> "$GITHUB_OUTPUT"
            echo "dir=app-ja"      >> "$GITHUB_OUTPUT"
            echo "slug=tensen"     >> "$GITHUB_OUTPUT"
            echo "name=Tensen"     >> "$GITHUB_OUTPUT"
          else
            echo "module=:app-zh" >> "$GITHUB_OUTPUT"
            echo "dir=app-zh"      >> "$GITHUB_OUTPUT"
            echo "slug=tianxian"   >> "$GITHUB_OUTPUT"
            echo "name=Tianxian"   >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version"  >> "$GITHUB_OUTPUT"
          echo "code=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # Decode the signing keystore from the KEYSTORE_BASE64 secret. The keystore itself is never
      # committed (see .gitignore) — CI receives it only through this secret. A release MUST be
      # signed with a stable key, or Android rejects the update as a signature mismatch. Both apps
      # may share one keystore: their applicationIds differ, so each is keyed independently.
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_FILE" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing is not configured. Set the four repo secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) — see docs/DEVELOPMENT.md. Refusing to publish a debug-signed release: its key changes every run, so installed copies could never update."
            exit 1
          fi
          gradle ${{ steps.app.outputs.module }}:assembleRelease \
            -PappVersionName=${{ steps.app.outputs.version }} \
            -PappVersionCode=${{ steps.app.outputs.code }}

      # Make signing auditable: this fingerprint must be identical on every release of an app, or
      # Android rejects the update as a package conflict.
      - name: Print signing certificate
        run: |
          "$ANDROID_HOME"/build-tools/35.0.0/apksigner verify --print-certs ${{ steps.app.outputs.dir }}/build/outputs/apk/release/*.apk | grep -i "SHA-256" | head -2

      # The asset name carries the slug prefix the in-app updater filters on (Updater.appApk).
      - name: Stage APK
        run: |
          mkdir -p dist
          cp ${{ steps.app.outputs.dir }}/build/outputs/apk/release/*.apk "dist/${{ steps.app.outputs.slug }}-v${{ steps.app.outputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.app.outputs.name }} v${{ steps.app.outputs.version }}
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
