name: Release APK

# Tag a commit (e.g. `git tag v0.8.0 && git push origin v0.8.0`) to cut a release: this builds a
# signed release APK and publishes it as a GitHub Release that users can download from the repo.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write        # needed to create the Release and upload the APK

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # Decode the signing keystore from the KEYSTORE_BASE64 secret. The keystore itself is never
      # committed (see .gitignore) — CI receives it only through this secret. A release MUST be
      # signed with this one stable key: the old debug-signing fallback minted a fresh throwaway
      # key on every CI run, so each published "release" conflicted with the previous install
      # instead of updating it.
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_FILE" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing is not configured. Set the four repo secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) — see docs/DEVELOPMENT.md. Refusing to publish a debug-signed release: its key changes every run, so installed copies could never update."
            exit 1
          fi
          gradle assembleRelease

      # Make signing auditable: this fingerprint must be identical on every release, or Android
      # rejects the update as a package conflict.
      - name: Print signing certificate
        run: |
          "$ANDROID_HOME"/build-tools/35.0.0/apksigner verify --print-certs app/build/outputs/apk/release/*.apk | grep -i "SHA-256" | head -2

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/scholar-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Scholar ${{ github.ref_name }}
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
