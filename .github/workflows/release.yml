name: Release APK

# Tag a commit (e.g. `git tag v0.8.0 && git push origin v0.8.0`) to cut a release: this builds a
# signed release APK and publishes it as a GitHub Release that users can download from the repo.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write        # needed to create the Release and upload the APK

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # Decodes the upload keystore from the KEYSTORE_BASE64 secret. If that secret is absent the
      # build still succeeds — it just falls back to debug signing (fine for testing, not for store
      # distribution). To sign for real, set the four repo secrets described in the README.
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "::warning::No KEYSTORE_BASE64 secret — producing a debug-signed release APK."
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/scholar-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Scholar ${{ github.ref_name }}
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
